name: Tests

# Enforces the CLAUDE.md rule "all tests must pass before pushing" on every PR
# and on pushes to main. The local .claude/hooks/run-playwright.py only runs the
# single matching spec for an edited website/ page — this runs the full suite.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  playwright:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm test
