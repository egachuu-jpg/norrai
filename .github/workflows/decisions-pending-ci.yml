name: decisions-pending CI

on:
  push:
    paths:
      - "decisions-pending/**"
      - ".github/workflows/decisions-pending-ci.yml"
  pull_request:
    paths:
      - "decisions-pending/**"
      - ".github/workflows/decisions-pending-ci.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cos_test
        ports:
          - 5439:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
    defaults:
      run:
        working-directory: decisions-pending
    env:
      COS_TEST_DB_URL: postgresql://postgres:postgres@localhost:5439/cos_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: pytest -v
