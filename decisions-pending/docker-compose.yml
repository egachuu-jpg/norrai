# Disposable Postgres for the pytest suite (Task A2 accept criteria).
# Usage: docker compose up -d
#        COS_TEST_DB_URL=postgresql://postgres:postgres@localhost:5439/cos_test pytest
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cos_test
    ports:
      - "5439:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 15
