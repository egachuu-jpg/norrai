<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control — Norr AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/norr_ai_favicon.svg">
<style>
  :root {
    --bone: #FAFAF7; --ink: #0A0F1A; --glacial: #7FA9B8; --graphite: #3A3F48;
    --blush: #E8D4C4; --surface: #FFFFFF; --border: #E5E4DE;
    --muted: #9EA3AA; --secondary: #6A6F78;
    --font-display: 'Inter Tight', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --radius-sm: 4px; --radius-md: 8px; --radius-lg: 12px;

    --cat-research: #7FA9B8;
    --cat-analysis: #C4956A;
    --cat-dev: #8B7BC4;
    --cat-testing: #5BA07A;
    --cat-ops: #6A6F78;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; -webkit-font-smoothing: antialiased; }
  body { font-family: var(--font-body); background: var(--bone); color: var(--ink); line-height: 1.5; min-height: 100dvh; }

  /* ── Header ── */
  .site-header { background: var(--ink); padding: 32px 24px 28px; border-bottom: 1px solid #1e2535; }
  .site-header-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .eyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--glacial); margin-bottom: 10px; }
  .site-header h1 { font-family: var(--font-display); font-weight: 700; font-size: 26px; letter-spacing: -0.03em; line-height: 1.1; color: var(--bone); }
  .site-header h1 .accent { color: var(--glacial); }
  .header-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  #last-updated { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 0.05em; }
  #refresh-btn { background: transparent; border: 1px solid #3a4555; color: var(--muted); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.05em; padding: 6px 14px; border-radius: var(--radius-sm); cursor: pointer; transition: border-color 0.15s, color 0.15s; }
  #refresh-btn:hover { border-color: var(--glacial); color: var(--glacial); }

  /* ── Toolbar ── */
  .toolbar { max-width: 1280px; margin: 0 auto; padding: 16px 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
  .view-toggle { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
  .view-btn { background: none; border: none; padding: 7px 16px; font-family: var(--font-body); font-size: 13px; font-weight: 500; color: var(--secondary); cursor: pointer; transition: background 0.12s, color 0.12s; }
  .view-btn.active { background: var(--ink); color: var(--bone); }
  .filter-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill { background: none; border: 1px solid var(--border); padding: 5px 12px; border-radius: 99px; font-size: 12px; font-weight: 500; color: var(--secondary); cursor: pointer; transition: all 0.12s; white-space: nowrap; }
  .pill.active { background: var(--ink); color: var(--bone); border-color: var(--ink); }
  .pill:hover:not(.active) { border-color: var(--secondary); color: var(--ink); }
  .toolbar-actions { margin-left: auto; display: flex; gap: 8px; }
  .btn-primary { background: var(--glacial); color: var(--surface); border: none; padding: 7px 16px; border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.12s; }
  .btn-primary:hover { background: #6a95a3; }
  .btn-outline { background: none; color: var(--ink); border: 1px solid var(--border); padding: 7px 16px; border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 13px; font-weight: 500; cursor: pointer; transition: border-color 0.12s; }
  .btn-outline:hover { border-color: var(--ink); }

  /* ── Main wrap ── */
  .wrap { max-width: 1280px; margin: 0 auto; padding: 28px 24px 80px; }

  /* ── Loading / Error ── */
  #loading { text-align: center; padding: 80px 0; color: var(--muted); font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.1em; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--glacial); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #error { display: none; background: #FEF2F2; border: 1px solid #FECACA; border-radius: var(--radius-md); padding: 20px 24px; color: #B91C1C; font-size: 14px; }
  #error button { background: none; border: 1px solid currentColor; color: inherit; font-size: 13px; padding: 6px 14px; border-radius: var(--radius-sm); cursor: pointer; margin-top: 12px; display: block; }

  /* ── Stories View ── */
  #stories-view { display: none; }
  #stories-view.visible { display: block; }
  .stories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-bottom: 40px; }
  .story-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; position: relative; cursor: pointer; transition: box-shadow 0.12s; }
  .story-card:hover { box-shadow: 0 2px 12px rgba(10,15,26,0.08); }
  .story-priority-badge { position: absolute; top: 14px; right: 14px; font-size: 10px; font-weight: 600; font-family: var(--font-mono); letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 8px; border-radius: 99px; }
  .badge-urgent { background: #FEE2E2; color: #B91C1C; }
  .badge-high   { background: #FEF3C7; color: #B45309; }
  .badge-medium { background: var(--border); color: var(--secondary); }
  .badge-low    { background: var(--bone); color: var(--muted); border: 1px solid var(--border); }
  .story-title { font-family: var(--font-display); font-weight: 600; font-size: 15px; letter-spacing: -0.01em; line-height: 1.3; padding-right: 60px; margin-bottom: 6px; }
  .story-desc { font-size: 13px; color: var(--secondary); line-height: 1.5; margin-bottom: 14px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .story-progress-bar-wrap { margin-bottom: 8px; }
  .story-progress-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; display: flex; justify-content: space-between; }
  .story-progress-bar { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .story-progress-fill { height: 100%; background: var(--glacial); border-radius: 99px; transition: width 0.3s; }
  .story-categories { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .cat-dot-wrap { display: flex; align-items: center; gap: 4px; }
  .cat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .cat-label { font-family: var(--font-mono); font-size: 10px; color: var(--secondary); }
  .story-view-link { display: block; text-align: right; font-size: 12px; color: var(--glacial); font-weight: 500; cursor: pointer; background: none; border: none; padding: 0; font-family: var(--font-body); }
  .story-view-link:hover { text-decoration: underline; }

  /* ── Standalone section ── */
  .section-label { font-family: var(--font-display); font-weight: 600; font-size: 14px; letter-spacing: -0.01em; color: var(--secondary); text-transform: uppercase; font-size: 11px; letter-spacing: 0.08em; margin-bottom: 12px; }
  .standalone-list { display: flex; flex-direction: column; gap: 6px; }
  .standalone-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: box-shadow 0.12s; }
  .standalone-item:hover { box-shadow: 0 2px 8px rgba(10,15,26,0.06); }
  .standalone-title { flex: 1; font-size: 14px; font-weight: 500; line-height: 1.4; }
  .priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .priority-urgent { background: #B91C1C; }
  .priority-high    { background: #D97706; }
  .priority-medium  { background: var(--muted); }
  .priority-low     { background: var(--border); }
  .status-chip { font-family: var(--font-mono); font-size: 10px; font-weight: 500; letter-spacing: 0.04em; padding: 2px 8px; border-radius: 99px; border: 1px solid var(--border); color: var(--secondary); white-space: nowrap; }
  .status-chip.backlog       { background: var(--bone); }
  .status-chip.ready         { background: #EFF6FF; color: #1D4ED8; border-color: #BFDBFE; }
  .status-chip.in_progress   { background: #ECFDF5; color: #065F46; border-color: #A7F3D0; }
  .status-chip.agent_working { background: #FDF4FF; color: #6B21A8; border-color: #E9D5FF; }
  .status-chip.review        { background: #FFFBEB; color: #92400E; border-color: #FDE68A; }
  .status-chip.done          { background: #F0FDF4; color: #166534; border-color: #BBF7D0; }

  /* ── Board View ── */
  #board-view { display: none; }
  #board-view.visible { display: block; }
  .board-scroll { overflow-x: auto; padding-bottom: 16px; }
  .board-columns { display: flex; gap: 12px; min-width: max-content; }
  .board-col { width: 260px; flex-shrink: 0; }
  .col-header { padding: 10px 12px; border-bottom: 2px solid var(--border); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
  .col-title { font-family: var(--font-display); font-size: 13px; font-weight: 600; letter-spacing: -0.01em; }
  .col-count { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
  .col-tasks { display: flex; flex-direction: column; gap: 8px; min-height: 60px; }
  .board-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px; cursor: pointer; transition: box-shadow 0.12s; }
  .board-card:hover { box-shadow: 0 2px 8px rgba(10,15,26,0.1); }
  .board-card.hidden { display: none; }
  .board-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
  .board-card-title { font-size: 13px; font-weight: 500; line-height: 1.35; flex: 1; }
  .board-card-story { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .board-card-bottom { display: flex; align-items: center; justify-content: space-between; }
  .agent-pulse { display: inline-flex; align-items: center; gap: 4px; font-family: var(--font-mono); font-size: 10px; color: #6B21A8; }
  .pulse-dot { width: 7px; height: 7px; background: #A855F7; border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.85); } }
  .col-more { font-size: 12px; color: var(--muted); text-align: center; padding: 8px; font-family: var(--font-mono); }
  .empty-col { color: var(--muted); font-size: 12px; font-style: italic; text-align: center; padding: 24px 8px; }
  .board-empty-state { text-align: center; padding: 60px 24px; color: var(--muted); font-size: 14px; }

  /* ── Category badge ── */
  .cat-badge { font-family: var(--font-mono); font-size: 10px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; color: var(--surface); flex-shrink: 0; }
  .cat-research { background: var(--cat-research); }
  .cat-analysis { background: var(--cat-analysis); }
  .cat-dev      { background: var(--cat-dev); }
  .cat-testing  { background: var(--cat-testing); }
  .cat-ops      { background: var(--cat-ops); }

  /* ── Drawer ── */
  #drawer-backdrop { display: none; position: fixed; inset: 0; background: rgba(10,15,26,0.4); backdrop-filter: blur(2px); z-index: 40; }
  #drawer-backdrop.visible { display: block; }
  #drawer { position: fixed; top: 0; right: -420px; width: 380px; height: 100dvh; background: var(--surface); border-left: 1px solid var(--border); z-index: 50; transition: right 0.25s ease; overflow-y: auto; display: flex; flex-direction: column; }
  #drawer.open { right: 0; }
  .drawer-header { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-shrink: 0; }
  .drawer-close { background: none; border: none; font-size: 20px; color: var(--muted); cursor: pointer; line-height: 1; padding: 0; flex-shrink: 0; margin-top: 2px; }
  .drawer-close:hover { color: var(--ink); }
  .drawer-body { padding: 20px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
  .drawer-title { font-family: var(--font-display); font-weight: 600; font-size: 17px; letter-spacing: -0.02em; line-height: 1.3; flex: 1; }
  .drawer-story-link { font-size: 12px; color: var(--glacial); font-weight: 500; cursor: pointer; background: none; border: none; padding: 0; font-family: var(--font-body); text-align: left; }
  .drawer-story-link:hover { text-decoration: underline; }
  .drawer-field-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; display: block; }
  .status-pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .status-pill { background: none; border: 1px solid var(--border); padding: 5px 10px; border-radius: 99px; font-size: 12px; font-weight: 500; color: var(--secondary); cursor: pointer; transition: all 0.12s; white-space: nowrap; font-family: var(--font-body); }
  .status-pill.active { background: var(--ink); color: var(--bone); border-color: var(--ink); }
  .status-pill:hover:not(.active) { border-color: var(--secondary); }
  .priority-pills { display: flex; gap: 6px; }
  .priority-pill { background: none; border: 1px solid var(--border); padding: 5px 12px; border-radius: 99px; font-size: 12px; font-weight: 500; color: var(--secondary); cursor: pointer; transition: all 0.12s; font-family: var(--font-body); }
  .priority-pill.active { background: var(--ink); color: var(--bone); border-color: var(--ink); }
  .priority-pill:hover:not(.active) { border-color: var(--secondary); }
  .drawer-textarea { width: 100%; border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px 12px; font-family: var(--font-body); font-size: 13px; color: var(--ink); background: var(--surface); resize: vertical; min-height: 80px; line-height: 1.5; transition: border-color 0.12s; }
  .drawer-textarea:focus { outline: none; border-color: var(--glacial); }
  .context-textarea { background: #F8F8FF; font-family: var(--font-mono); font-size: 12px; }
  .output-section { background: var(--bone); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 14px; }
  .output-text { font-family: var(--font-mono); font-size: 12px; color: var(--ink); white-space: pre-wrap; line-height: 1.6; }
  .output-empty { font-size: 13px; color: var(--muted); font-style: italic; }
  .output-textarea { width: 100%; border: none; background: transparent; font-family: var(--font-mono); font-size: 12px; color: var(--ink); resize: vertical; min-height: 120px; line-height: 1.6; }
  .output-textarea:focus { outline: none; }
  .drawer-actions { display: flex; flex-direction: column; gap: 8px; padding-top: 4px; }
  .btn-dispatch { background: var(--glacial); color: var(--surface); border: none; padding: 10px 18px; border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.12s; display: flex; align-items: center; gap: 8px; justify-content: center; }
  .btn-dispatch:hover { background: #6a95a3; }
  .btn-dispatch:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-copy { background: var(--surface); color: var(--ink); border: 1px solid var(--border); padding: 10px 18px; border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 13px; font-weight: 500; cursor: pointer; transition: border-color 0.12s; }
  .btn-copy:hover { border-color: var(--ink); }
  .btn-save { background: var(--ink); color: var(--bone); border: none; padding: 10px 18px; border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.12s; }
  .btn-save:hover { background: var(--graphite); }
  .drawer-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: var(--surface); border-radius: 50%; animation: spin 0.7s linear infinite; }

  /* ── Modals ── */
  .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(10,15,26,0.5); backdrop-filter: blur(2px); z-index: 60; align-items: center; justify-content: center; }
  .modal-backdrop.visible { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius-lg); padding: 28px; width: 480px; max-width: 95vw; max-height: 90dvh; overflow-y: auto; box-shadow: 0 16px 40px rgba(10,15,26,0.16); }
  .modal-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 20px; }
  .modal-field { margin-bottom: 16px; }
  .modal-label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .modal-input { width: 100%; border: 1px solid var(--border); border-radius: var(--radius-md); padding: 9px 12px; font-family: var(--font-body); font-size: 14px; color: var(--ink); background: var(--surface); transition: border-color 0.12s; }
  .modal-input:focus { outline: none; border-color: var(--glacial); }
  .modal-select { width: 100%; border: 1px solid var(--border); border-radius: var(--radius-md); padding: 9px 12px; font-family: var(--font-body); font-size: 14px; color: var(--ink); background: var(--surface); appearance: none; cursor: pointer; transition: border-color 0.12s; }
  .modal-select:focus { outline: none; border-color: var(--glacial); }
  .modal-textarea { width: 100%; border: 1px solid var(--border); border-radius: var(--radius-md); padding: 9px 12px; font-family: var(--font-body); font-size: 14px; color: var(--ink); background: var(--surface); resize: vertical; min-height: 80px; line-height: 1.5; transition: border-color 0.12s; }
  .modal-textarea:focus { outline: none; border-color: var(--glacial); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
  .btn-modal-cancel { background: none; border: 1px solid var(--border); color: var(--secondary); padding: 9px 18px; border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 13px; cursor: pointer; transition: border-color 0.12s; }
  .btn-modal-cancel:hover { border-color: var(--secondary); }
  .btn-modal-create { background: var(--ink); color: var(--bone); border: none; padding: 9px 18px; border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.12s; }
  .btn-modal-create:hover { background: var(--graphite); }

  .empty-state { color: var(--muted); font-size: 14px; text-align: center; padding: 48px 24px; }

  @media (max-width: 640px) {
    .site-header { padding: 24px 18px 20px; }
    .toolbar { padding: 12px 18px; }
    .wrap { padding: 20px 18px 60px; }
    #drawer { width: 100%; right: -100%; }
    .toolbar-actions { width: 100%; }
    .btn-primary, .btn-outline { flex: 1; text-align: center; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <div>
      <div class="eyebrow">Internal &middot; Mission Control</div>
      <h1>Mission <span class="accent">Control</span></h1>
    </div>
    <div class="header-actions">
      <span id="last-updated"></span>
      <button id="refresh-btn">Refresh</button>
    </div>
  </div>
</header>

<div class="toolbar">
  <div class="view-toggle">
    <button class="view-btn active" id="btn-stories">Stories</button>
    <button class="view-btn" id="btn-board">Board</button>
  </div>
  <div class="filter-pills" id="filter-pills">
    <button class="pill active" data-cat="all">All</button>
    <button class="pill" data-cat="dev">Dev</button>
    <button class="pill" data-cat="research">Research</button>
    <button class="pill" data-cat="analysis">Analysis</button>
    <button class="pill" data-cat="testing">Testing</button>
    <button class="pill" data-cat="ops">Ops</button>
  </div>
  <div class="toolbar-actions">
    <button class="btn-outline" id="btn-new-story">+ Story</button>
    <button class="btn-primary" id="btn-new-task">+ Task</button>
  </div>
</div>

<div class="wrap">
  <div id="loading"><div class="spinner"></div><div>Loading mission data&hellip;</div></div>
  <div id="error"></div>

  <!-- Stories View -->
  <div id="stories-view">
    <div id="stories-grid" class="stories-grid"></div>
    <div id="standalone-section" style="display:none">
      <div class="section-label">Standalone Tasks</div>
      <div id="standalone-list" class="standalone-list"></div>
    </div>
    <div id="stories-empty" class="empty-state" style="display:none">No active stories. Create one to get started.</div>
  </div>

  <!-- Board View -->
  <div id="board-view">
    <div class="board-scroll">
      <div class="board-columns" id="board-columns"></div>
    </div>
  </div>
</div>

<!-- Drawer -->
<div id="drawer-backdrop"></div>
<div id="drawer" role="dialog" aria-modal="true" aria-label="Task detail">
  <div class="drawer-header">
    <div style="display:flex;flex-direction:column;gap:6px;flex:1">
      <div id="drawer-cat-badge"></div>
      <div id="drawer-title" class="drawer-title"></div>
      <button id="drawer-story-link" class="drawer-story-link" style="display:none"></button>
    </div>
    <button class="drawer-close" id="drawer-close" aria-label="Close">&#xd7;</button>
  </div>
  <div class="drawer-body">
    <div>
      <span class="drawer-field-label">Status</span>
      <div class="status-pills" id="drawer-status-pills"></div>
    </div>
    <div>
      <span class="drawer-field-label">Priority</span>
      <div class="priority-pills" id="drawer-priority-pills"></div>
    </div>
    <div>
      <span class="drawer-field-label">Description</span>
      <textarea class="drawer-textarea" id="drawer-description" placeholder="Add description&hellip;" rows="3"></textarea>
    </div>
    <div>
      <span class="drawer-field-label">Context for Agent</span>

      </div>

    <div class="drawer-actions">

      <button class="btn-copy" id="btn-copy-prompt" style="display:none">Copy Agent Prompt</button>

</div>

<script>
  const WEBHOOK_LIST     = 'https://norrai.app.n8n.cloud/webhook/mc-tasks';
  const WEBHOOK_MUTATE   = 'https://norrai.app.n8n.cloud/webhook/mc-mutate';
  const WEBHOOK_DISPATCH = 'https://norrai.app.n8n.cloud/webhook/mc-dispatch';
  const TOKEN = '8F68D963-7060-4033-BD04-7593E4B203CB';

  const STATUSES = ['backlog', 'ready', 'in_progress', 'agent_working', 'review', 'done'];
  const STATUS_LABELS = { backlog: 'Backlog', ready: 'Ready', in_progress: 'In Progress', agent_working: 'Agent Working', review: 'Review', done: 'Done' };
  const PRIORITIES = ['low', 'medium', 'high', 'urgent'];
  const CAT_LABELS = { research: 'R', analysis: 'A', dev: 'D', testing: 'T', ops: 'O' };

  let state = {
    stories: [],
    standalone: [],
    view: 'stories',
    categoryFilter: 'all',
    loading: true,
    error: null,
    drawer: null,
    drawerDirty: false,
  };

  // ── DOM refs ──────────────────────────────────────────────────────────────────
  const loadingEl      = document.getElementById('loading');
  const errorEl        = document.getElementById('error');
  const storiesView    = document.getElementById('stories-view');
  const boardView      = document.getElementById('board-view');
  const storiesGrid    = document.getElementById('stories-grid');
  const standaloneSection = document.getElementById('standalone-section');
  const standaloneList = document.getElementById('standalone-list');
  const storiesEmpty   = document.getElementById('stories-empty');
  const boardColumns   = document.getElementById('board-columns');
  const lastUpdatedEl  = document.getElementById('last-updated');
  const drawerEl       = document.getElementById('drawer');
  const drawerBackdrop = document.getElementById('drawer-backdrop');

  // ── Utilities ─────────────────────────────────────────────────────────────────
  function formatTime(iso) {
    return new Date(iso).toLocaleString('en-US', {
      timeZone: 'America/Chicago', month: 'short', day: 'numeric',
      hour: 'numeric', minute: '2-digit'
    });
  }

  function catBadgeHTML(cat) {
    return `<span class="cat-badge cat-${cat}">${cat.toUpperCase()}</span>`;
  }

  function priorityBadgeClass(p) {
    return `badge-${p}`;
  }

  function priorityDotClass(p) {
    return `priority-${p}`;
  }

  function filterTask(task) {
    if (state.categoryFilter === 'all') return true;
    return task.category === state.categoryFilter;
  }

  function allTasksForBoard() {
    const all = [];
    for (const story of state.stories) {
      for (const task of (story.tasks || [])) {
        all.push({ ...task, _storyTitle: story.title });
      }
    }
    for (const task of state.standalone) {
      all.push({ ...task, _storyTitle: null });
    }
    return all;
  }

  // ── Fetch ─────────────────────────────────────────────────────────────────────
  async function loadData() {
    state.loading = true;
    state.error = null;
    loadingEl.style.display = 'block';
    errorEl.style.display = 'none';
    storiesView.classList.remove('visible');
    boardView.classList.remove('visible');

    try {
      const res = await fetch(WEBHOOK_LIST, { headers: { 'x-norr-token': TOKEN } });
      if (!res.ok) throw new Error('Server returned ' + res.status);
      const data = await res.json();
      state.stories = data.stories || [];
      state.standalone = data.standalone || [];
      if (data.generated_at) {
        lastUpdatedEl.textContent = 'Last updated ' + formatTime(data.generated_at);
      }
      state.loading = false;
      render();
    } catch (err) {
      state.loading = false;
      state.error = err.message;
      loadingEl.style.display = 'none';
      errorEl.style.display = 'block';
      errorEl.innerHTML = '';
      const msg = document.createElement('div');
      msg.textContent = 'Failed to load mission data: ' + err.message;
      const retryBtn = document.createElement('button');
      retryBtn.textContent = 'Retry';
      retryBtn.addEventListener('click', loadData);
      errorEl.append(msg, retryBtn);
    }
  }

  // ── Render ────────────────────────────────────────────────────────────────────
  function render() {
    loadingEl.style.display = 'none';
    errorEl.style.display = 'none';
    if (state.view === 'stories') {
      storiesView.classList.add('visible');
      boardView.classList.remove('visible');
      renderStories();
    } else {
      boardView.classList.add('visible');
      storiesView.classList.remove('visible');
      renderBoard();
    }
  }

  function renderStories() {
    storiesGrid.innerHTML = '';
    const filtered = state.stories.filter(s => {
      if (state.categoryFilter === 'all') return true;
      return (s.tasks || []).some(t => t.category === state.categoryFilter);
    });

    if (filtered.length === 0 && state.standalone.filter(filterTask).length === 0) {
      storiesEmpty.style.display = 'block';
    } else {
      storiesEmpty.style.display = 'none';
    }

    for (const story of filtered) {
      const tasks = story.tasks || [];
      const visibleTasks = state.categoryFilter === 'all' ? tasks : tasks.filter(t => t.category === state.categoryFilter);
      const doneCount = visibleTasks.filter(t => t.status === 'done').length;
      const total = visibleTasks.length;
      const pct = total > 0 ? Math.round((doneCount / total) * 100) : 0;

      // Category breakdown
      const catCounts = {};
      for (const t of tasks) {
        catCounts[t.category] = (catCounts[t.category] || 0) + 1;
      }

      const card = document.createElement('div');
      card.className = 'story-card';
      card.dataset.storyId = story.id;

      const priorityBadge = document.createElement('div');
      priorityBadge.className = `story-priority-badge ${priorityBadgeClass(story.priority)}`;
      priorityBadge.textContent = story.priority.charAt(0).toUpperCase() + story.priority.slice(1);

      const titleEl = document.createElement('div');
      titleEl.className = 'story-title';
      titleEl.textContent = story.title;

      const descEl = document.createElement('div');
      descEl.className = 'story-desc';
      descEl.textContent = story.description || '';
      if (!story.description) descEl.style.display = 'none';

      const progressWrap = document.createElement('div');
      progressWrap.className = 'story-progress-bar-wrap';
      progressWrap.innerHTML = `
        <div class="story-progress-label">
          <span>${doneCount} / ${total} tasks done</span>
          <span>${pct}%</span>
        </div>
        <div class="story-progress-bar">
          <div class="story-progress-fill" style="width:${pct}%"></div>
        </div>
      `;

      const catsEl = document.createElement('div');
      catsEl.className = 'story-categories';
      for (const [cat, count] of Object.entries(catCounts)) {
        const wrap = document.createElement('div');
        wrap.className = 'cat-dot-wrap';
        wrap.innerHTML = `<div class="cat-dot" style="background:var(--cat-${cat})"></div><span class="cat-label">${CAT_LABELS[cat]}${count}</span>`;
        catsEl.appendChild(wrap);
      }

      const viewLink = document.createElement('button');
      viewLink.className = 'story-view-link';
      viewLink.textContent = 'View tasks →';
      viewLink.addEventListener('click', (e) => {
        e.stopPropagation();
        switchToBoard();
        // Filter to show this story's tasks by switching view
      });

      card.append(priorityBadge, titleEl, descEl, progressWrap, catsEl, viewLink);
      storiesGrid.appendChild(card);
    }

    // Standalone tasks
    const filteredStandalone = state.standalone.filter(filterTask);
    if (filteredStandalone.length > 0) {
      standaloneSection.style.display = 'block';
      standaloneList.innerHTML = '';
      for (const task of filteredStandalone) {
        const item = document.createElement('div');
        item.className = 'standalone-item';
        item.dataset.taskId = task.id;
        item.innerHTML = `
          <span class="cat-badge cat-${task.category}">${task.category.toUpperCase()}</span>
          <span class="standalone-title">${escapeHtml(task.title)}</span>
          <div class="priority-dot ${priorityDotClass(task.priority)}"></div>
          <span class="status-chip ${task.status}">${STATUS_LABELS[task.status] || task.status}</span>
        `;
        item.addEventListener('click', () => openDrawer(task));
        standaloneList.appendChild(item);
      }
    } else {
      standaloneSection.style.display = 'none';
    }
  }

  function renderBoard() {
    boardColumns.innerHTML = '';
    const allTasks = allTasksForBoard().filter(filterTask);
    const DONE_LIMIT = 10;

    for (const status of STATUSES) {
      const col = document.createElement('div');
      col.className = 'board-col';
      col.dataset.status = status;

      const colTasks = allTasks.filter(t => t.status === status);
      const displayTasks = status === 'done' ? colTasks.slice(0, DONE_LIMIT) : colTasks;
      const hiddenCount = status === 'done' ? colTasks.length - displayTasks.length : 0;

      const header = document.createElement('div');
      header.className = 'col-header';
      header.innerHTML = `<span class="col-title">${STATUS_LABELS[status]}</span><span class="col-count">${colTasks.length}</span>`;

      const taskList = document.createElement('div');
      taskList.className = 'col-tasks';

      if (displayTasks.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-col';
        empty.textContent = 'No tasks';
        taskList.appendChild(empty);
      } else {
        for (const task of displayTasks) {
          const card = buildBoardCard(task);
          taskList.appendChild(card);
        }
      }

      if (hiddenCount > 0) {
        const more = document.createElement('div');
        more.className = 'col-more';
        more.textContent = `+ ${hiddenCount} more completed`;
        taskList.appendChild(more);
      }

      col.append(header, taskList);
      boardColumns.appendChild(col);
    }
  }

  function buildBoardCard(task) {
    const card = document.createElement('div');
    card.className = 'board-card';
    card.dataset.taskId = task.id;

    const top = document.createElement('div');
    top.className = 'board-card-top';
    const titleEl = document.createElement('div');
    titleEl.className = 'board-card-title';
    titleEl.textContent = task.title;
    const dot = document.createElement('div');
    dot.className = `priority-dot ${priorityDotClass(task.priority)}`;
    top.append(titleEl, dot);

    const bottom = document.createElement('div');
    bottom.className = 'board-card-bottom';

    const badge = document.createElement('span');
    badge.className = `cat-badge cat-${task.category}`;
    badge.textContent = task.category.toUpperCase();
    bottom.appendChild(badge);

    if (task.status === 'agent_working') {
      const pulse = document.createElement('span');
      pulse.className = 'agent-pulse';
      pulse.innerHTML = '<span class="pulse-dot"></span>Working';
      bottom.appendChild(pulse);
    }

    card.append(top, bottom);

    if (task._storyTitle) {
      const storyEl = document.createElement('div');
      storyEl.className = 'board-card-story';
      storyEl.textContent = task._storyTitle;
      card.insertBefore(storyEl, bottom);
    }

    card.addEventListener('click', () => {
      const t = findTask(task.id);
      if (t) openDrawer(t);
    });

    return card;
  }

  // ── Find task in state ────────────────────────────────────────────────────────
  function findTask(id) {
    for (const story of state.stories) {
      for (const t of (story.tasks || [])) {
        if (t.id === id) return t;
      }
    }
    return state.standalone.find(t => t.id === id) || null;
  }

  function findStory(id) {
    return state.stories.find(s => s.id === id) || null;
  }

  // ── Drawer ────────────────────────────────────────────────────────────────────
  function openDrawer(task) {
    state.drawer = task;
    state.drawerDirty = false;

    document.getElementById('drawer-cat-badge').innerHTML = catBadgeHTML(task.category);
    document.getElementById('drawer-title').textContent = task.title;

    const storyLink = document.getElementById('drawer-story-link');
    if (task.story_id) {
      const story = findStory(task.story_id);
      storyLink.style.display = 'inline';
      storyLink.textContent = '↑ ' + (story ? story.title : task.story_id);
    } else {
      storyLink.style.display = 'none';
    }

    // Status pills
    const statusPills = document.getElementById('drawer-status-pills');
    statusPills.innerHTML = '';
    for (const s of STATUSES) {
      const btn = document.createElement('button');
      btn.className = 'status-pill' + (task.status === s ? ' active' : '');
      btn.textContent = STATUS_LABELS[s];
      btn.dataset.status = s;
      btn.addEventListener('click', () => updateField('status', s));
      statusPills.appendChild(btn);
    }

    // Priority pills
    const priorityPills = document.getElementById('drawer-priority-pills');
    priorityPills.innerHTML = '';
    for (const p of PRIORITIES) {
      const btn = document.createElement('button');
      btn.className = 'priority-pill' + (task.priority === p ? ' active' : '');
      btn.textContent = p.charAt(0).toUpperCase() + p.slice(1);
      btn.dataset.priority = p;
      btn.addEventListener('click', () => updateField('priority', p));
      priorityPills.appendChild(btn);
    }

    document.getElementById('drawer-description').value = task.description || '';
    document.getElementById('drawer-context').value = task.context || '';

    // Output
    const outputEmpty = document.getElementById('drawer-output-empty');
    const outputText = document.getElementById('drawer-output-text');
    if (task.output) {
      outputEmpty.style.display = 'none';
      outputText.style.display = 'block';
      outputText.value = task.output;
    } else {
      outputEmpty.style.display = 'block';
      outputText.style.display = 'none';
      outputText.value = '';
    }

    // Action buttons
    const btnDispatch = document.getElementById('btn-dispatch');
    const btnCopy = document.getElementById('btn-copy-prompt');
    btnDispatch.style.display = 'none';
    btnCopy.style.display = 'none';
    if (task.category === 'research' || task.category === 'analysis') {
      if (task.status === 'ready' || task.status === 'in_progress') {
        btnDispatch.style.display = 'flex';
      }
    } else if (task.category === 'dev' || task.category === 'testing') {
      btnCopy.style.display = 'block';
    }

    drawerBackdrop.classList.add('visible');
    drawerEl.classList.add('open');
    drawerEl.focus();
  }

  function closeDrawer() {
    if (state.drawerDirty) {
      if (!confirm('You have unsaved changes. Close anyway?')) return;
    }
    state.drawer = null;
    state.drawerDirty = false;
    drawerEl.classList.remove('open');
    drawerBackdrop.classList.remove('visible');
  }

  async function updateField(field, value) {
    if (!state.drawer) return;
    const taskId = state.drawer.id;

    // Optimistic update
    state.drawer[field] = value;
    updateTaskInState(taskId, field, value);

    // Re-render pills
    if (field === 'status') {
      document.querySelectorAll('#drawer-status-pills .status-pill').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.status === value);
      });
      // Show/hide dispatch button based on new status
      const btnDispatch = document.getElementById('btn-dispatch');
      if (state.drawer.category === 'research' || state.drawer.category === 'analysis') {
        btnDispatch.style.display = (value === 'ready' || value === 'in_progress') ? 'flex' : 'none';
      }
    }
    if (field === 'priority') {
      document.querySelectorAll('#drawer-priority-pills .priority-pill').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.priority === value);
      });
    }
    render();

    try {
      await fetch(WEBHOOK_MUTATE, {
        method: 'POST',
        headers: { 'x-norr-token': TOKEN, 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'update_task', task_id: taskId, [field]: value })
      });
    } catch (e) {
      // silently fail — optimistic update already applied
    }
  }

  function updateTaskInState(taskId, field, value) {
    for (const story of state.stories) {
      for (const t of (story.tasks || [])) {
        if (t.id === taskId) { t[field] = value; return; }
      }
    }
    const idx = state.standalone.findIndex(t => t.id === taskId);
    if (idx !== -1) state.standalone[idx][field] = value;
  }

  // ── Dispatch ──────────────────────────────────────────────────────────────────
  async function dispatchTask() {
    if (!state.drawer) return;
    const taskId = state.drawer.id;
    const btnDispatch = document.getElementById('btn-dispatch');
    btnDispatch.disabled = true;
    btnDispatch.innerHTML = '<span class="drawer-spinner"></span> Working&hellip;';

    // Move to agent_working
    await updateField('status', 'agent_working');

    try {
      const res = await fetch(WEBHOOK_DISPATCH, {
        method: 'POST',
        headers: { 'x-norr-token': TOKEN, 'Content-Type': 'application/json' },
        body: JSON.stringify({ task_id: taskId })
      });
      const data = await res.json();
      const output = data.output || '(No output returned)';
      state.drawer.output = output;
      updateTaskInState(taskId, 'output', output);
      updateTaskInState(taskId, 'status', 'review');
      state.drawer.status = 'review';

      const outputEmpty = document.getElementById('drawer-output-empty');
      const outputText = document.getElementById('drawer-output-text');
      outputEmpty.style.display = 'none';
      outputText.style.display = 'block';
      outputText.value = output;

      document.querySelectorAll('#drawer-status-pills .status-pill').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.status === 'review');
      });
      btnDispatch.style.display = 'none';
      render();
    } catch (e) {
      alert('Dispatch failed: ' + e.message);
    } finally {
      btnDispatch.disabled = false;
      btnDispatch.innerHTML = 'Dispatch to Agent &#9654;';
    }
  }

  // ── Copy prompt ───────────────────────────────────────────────────────────────
  function copyAgentPrompt() {
    if (!state.drawer) return;
    const t = state.drawer;
    const story = t.story_id ? findStory(t.story_id) : null;
    const storyCtx = story ? `Story: ${story.title}\n${story.description || ''}\n\n` : '';
    const prompt = `${storyCtx}Task: ${t.title}\nCategory: ${t.category}\n\nDescription:\n${t.description || '(none)'}\n\nContext:\n${t.context || '(none)'}`;
    navigator.clipboard.writeText(prompt).then(() => {
      const btn = document.getElementById('btn-copy-prompt');
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = 'Copy Agent Prompt'; }, 2000);
    });
  }

  // ── Save changes ──────────────────────────────────────────────────────────────
  async function saveDrawer() {
    if (!state.drawer) return;
    const taskId = state.drawer.id;
    const description = document.getElementById('drawer-description').value;
    const context = document.getElementById('drawer-context').value;
    const output = document.getElementById('drawer-output-text').value;

    state.drawer.description = description;
    state.drawer.context = context;
    state.drawer.output = output;
    updateTaskInState(taskId, 'description', description);
    updateTaskInState(taskId, 'context', context);
    updateTaskInState(taskId, 'output', output);
    state.drawerDirty = false;

    const btnSave = document.getElementById('btn-save');
    btnSave.textContent = 'Saving…';
    try {
      await fetch(WEBHOOK_MUTATE, {
        method: 'POST',
        headers: { 'x-norr-token': TOKEN, 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'update_task', task_id: taskId, description, context, output })
      });
      btnSave.textContent = 'Saved!';
      setTimeout(() => { btnSave.textContent = 'Save Changes'; }, 1500);
    } catch (e) {
      btnSave.textContent = 'Save Changes';
    }
    render();
  }

  // ── Create task ───────────────────────────────────────────────────────────────
  function openTaskModal() {
    // Populate story select
    const sel = document.getElementById('nt-story');
    sel.innerHTML = '<option value="">No story (standalone)</option>';
    for (const s of state.stories) {
      const opt = document.createElement('option');
      opt.value = s.id;
      opt.textContent = s.title;
      sel.appendChild(opt);
    }
    document.getElementById('nt-title').value = '';
    document.getElementById('nt-description').value = '';
    document.getElementById('nt-context').value = '';
    document.getElementById('modal-task').classList.add('visible');
    document.getElementById('nt-title').focus();
  }

  async function createTask() {
    const title = document.getElementById('nt-title').value.trim();
    if (!title) { document.getElementById('nt-title').focus(); return; }
    const category = document.getElementById('nt-category').value;
    const priority = document.getElementById('nt-priority').value;
    const storyId = document.getElementById('nt-story').value;
    const description = document.getElementById('nt-description').value;
    const context = document.getElementById('nt-context').value;

    const btn = document.getElementById('nt-create');
    btn.textContent = 'Creating…';
    btn.disabled = true;

    try {
      const res = await fetch(WEBHOOK_MUTATE, {
        method: 'POST',
        headers: { 'x-norr-token': TOKEN, 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'create_task', title, category, priority, story_id: storyId || null, description, context })
      });
      const data = await res.json();
      document.getElementById('modal-task').classList.remove('visible');
      // Reload to get fresh data with server-assigned ID
      await loadData();
    } catch (e) {
      alert('Failed to create task: ' + e.message);
    } finally {
      btn.textContent = 'Create Task';
      btn.disabled = false;
    }
  }

  // ── Create story ──────────────────────────────────────────────────────────────
  function openStoryModal() {
    document.getElementById('ns-title').value = '';
    document.getElementById('ns-description').value = '';
    document.getElementById('ns-outcome').value = '';
    document.getElementById('ns-priority').value = 'medium';
    document.getElementById('modal-story').classList.add('visible');
    document.getElementById('ns-title').focus();
  }

  async function createStory() {
    const title = document.getElementById('ns-title').value.trim();
    if (!title) { document.getElementById('ns-title').focus(); return; }
    const description = document.getElementById('ns-description').value;
    const outcome = document.getElementById('ns-outcome').value;
    const priority = document.getElementById('ns-priority').value;

    const btn = document.getElementById('ns-create');
    btn.textContent = 'Creating…';
    btn.disabled = true;

    try {
      await fetch(WEBHOOK_MUTATE, {
        method: 'POST',
        headers: { 'x-norr-token': TOKEN, 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'create_story', title, description, outcome, priority })
      });
      document.getElementById('modal-story').classList.remove('visible');
      await loadData();
    } catch (e) {
      alert('Failed to create story: ' + e.message);
    } finally {
      btn.textContent = 'Create Story';
      btn.disabled = false;
    }
  }

  // ── View switch ───────────────────────────────────────────────────────────────
  function switchToBoard() {
    state.view = 'board';
    document.getElementById('btn-stories').classList.remove('active');
    document.getElementById('btn-board').classList.add('active');
    render();
  }

  // ── Escape HTML ───────────────────────────────────────────────────────────────
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  // ── Event listeners ───────────────────────────────────────────────────────────
  document.getElementById('refresh-btn').addEventListener('click', loadData);

  document.getElementById('btn-stories').addEventListener('click', () => {
    state.view = 'stories';
    document.getElementById('btn-stories').classList.add('active');
    document.getElementById('btn-board').classList.remove('active');
    render();
  });

  document.getElementById('btn-board').addEventListener('click', switchToBoard);

  document.getElementById('filter-pills').addEventListener('click', (e) => {
    const pill = e.target.closest('.pill');
    if (!pill) return;
    state.categoryFilter = pill.dataset.cat;
    document.querySelectorAll('#filter-pills .pill').forEach(p => p.classList.toggle('active', p.dataset.cat === state.categoryFilter));
    render();
  });

  document.getElementById('btn-new-task').addEventListener('click', openTaskModal);
  document.getElementById('btn-new-story').addEventListener('click', openStoryModal);

  document.getElementById('drawer-close').addEventListener('click', closeDrawer);
  drawerBackdrop.addEventListener('click', closeDrawer);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (document.getElementById('modal-task').classList.contains('visible')) {
        document.getElementById('modal-task').classList.remove('visible');
      } else if (document.getElementById('modal-story').classList.contains('visible')) {
        document.getElementById('modal-story').classList.remove('visible');
      } else if (drawerEl.classList.contains('open')) {
        closeDrawer();
      }
    }
  });

  ['drawer-description', 'drawer-context', 'drawer-output-text'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => { state.drawerDirty = true; });
  });

  document.getElementById('btn-dispatch').addEventListener('click', dispatchTask);
  document.getElementById('btn-copy-prompt').addEventListener('click', copyAgentPrompt);
  document.getElementById('btn-save').addEventListener('click', saveDrawer);

  document.getElementById('nt-cancel').addEventListener('click', () => document.getElementById('modal-task').classList.remove('visible'));
  document.getElementById('nt-create').addEventListener('click', createTask);
  document.getElementById('ns-cancel').addEventListener('click', () => document.getElementById('modal-story').classList.remove('visible'));
  document.getElementById('ns-create').addEventListener('click', createStory);

  // Close modals on backdrop click
  document.getElementById('modal-task').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modal-task')) document.getElementById('modal-task').classList.remove('visible');
  });
  document.getElementById('modal-story').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modal-story')) document.getElementById('modal-story').classList.remove('visible');
  });

  // Init
  loadData();
</script>
</body>
</html>
